# ============================================
# Minimal Nix CI Template
# ============================================
# Quick-start template for Nix projects
# Single system (x86_64-linux), fast feedback
#
# SETUP: Copy to .github/workflows/ci.yml and adapt
# ============================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Enable Cachix (optional) - add CACHIX_AUTH_TOKEN secret
      - uses: cachix/cachix-action@v14
        with:
          name: mycache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true
        continue-on-error: true

      # Core checks
      - name: Flake check
        run: nix flake check

      - name: Build package
        run: nix build

      # Tests (adapt to your project)
      # - name: Run tests
      #   run: nix run .#default -- --test

      # - name: Check output
      #   run: test -e result || exit 1
