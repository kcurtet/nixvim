# ============================================
# Nix CI Template
# ============================================
# Reusable workflow template for Nix-based projects
# Supports: flakes, packages, apps, checks, tests
#
# SETUP INSTRUCTIONS:
# 1. Copy this file to .github/workflows/ci.yml
# 2. Adjust 'on' triggers as needed
# 3. Enable Cachix (optional) - see Cachix section below
# 4. Adjust matrix for target systems
# 5. Adapt run steps for your project type
# ============================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Avoid Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================
  # CORE CHECKS - Run on every commit
  # ============================================
  flake-check:
    name: Flake Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run flake check
        run: nix flake check

  # ============================================
  # BUILD & TEST - Matrix across systems
  # ============================================
  build:
    name: Build (${{ matrix.system }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Continue other builds if one fails
      matrix:
        include:
          # Linux builds
          - system: x86_64-linux
            os: ubuntu-latest
            attr: default
          # macOS builds (uncomment if needed)
          # - system: aarch64-darwin
          #   os: macos-latest
          #   attr: default
          # - system: x86_64-darwin
          #   os: macos-14
          #   attr: default

    steps:
      - uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # ============================================
      # CACHIX - Build Caching (Optional)
      # ============================================
      # To enable caching:
      # 1. Create a cache at https://cachix.org
      # 2. Add CACHIX_AUTH_TOKEN to GitHub repo secrets
      # 3. Change 'skipPush: true' to 'skipPush: false'
      # 4. Replace 'mycache' with your cache name
      # ============================================
      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: mycache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true
        continue-on-error: true

      # ============================================
      # BUILD STEPS
      # ============================================
      # Adapt these steps for your project type
      # ============================================

      # Type 1: Simple package build
      - name: Build package
        run: nix build .#${{ matrix.attr }}

      # Type 2: Build all packages (if outputs.packages.*.* exists)
      # - name: Build all packages
      #   run: |
      #     for attr in $(nix flake show --json | jq -r ".packages.\"${{ matrix.system }}\" | keys | .[]"); do
      #       echo "Building $attr..."
      #       nix build .#packages.${{ matrix.system }}.$attr || echo "Failed: $attr"
      #     done

      # Type 3: Build checks (if outputs.checks.*.* exists)
      - name: Run checks
        run: |
          nix build .#checks.${{ matrix.system }}.flake-check || true
          # Add more checks as needed:
          # nix build .#checks.${{ matrix.system }}.unit-tests
          # nix build .#checks.${{ matrix.system }}.integration-tests

      # ============================================
      # TEST STEPS
      # ============================================
      # Type 1: Run nix-shell tests
      # - name: Test with nix-shell
      #   run: nix-shell --run "echo 'Shell test OK'"

      # Type 2: Run project-specific tests
      # - name: Run project tests
      #   run: nix run .#${{ matrix.attr }} -- --test

      # ============================================
      # VALIDATION
      # ============================================
      - name: Validate build output
        run: |
          if [ -e result ]; then
            echo "Build successful: $(readlink -f result)"
          else
            echo "No result symlink found"
            exit 1
          fi

  # ============================================
  # OPTIONAL JOBS (Enable as needed)
  # ============================================

  # Run tests in dev shell
  # test-shell:
  #   name: Test Shell
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v5
  #     - uses: cachix/install-nix-action@v31
  #     - run: nix-shell --run "echo 'Shell OK'"

  # Run formatting/linting
  # lint:
  #   name: Lint
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v5
  #     - uses: cachix/install-nix-action@v31
  #     - run: |
  #       nix run .#treefmt -- --fail-on-change .
  #       nix run .#statix check

  # Build and push to Cachix (separate job for caching)
  # cachix-push:
  #   name: Push to Cachix
  #   runs-on: ubuntu-latest
  #   needs: build
  #   if: github.event_name == 'push' && github.ref == 'refs/heads/main'
  #   steps:
  #     - uses: actions/checkout@v5
  #     - uses: cachix/install-nix-action@v31
  #     - uses: cachix/cachix-action@v14
  #       with:
  #         name: mycache
  #         authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
  #         skipPush: false
  #       with:
  #         push: true

