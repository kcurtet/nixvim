name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Cachix for Nix build caching (disabled by default)
      # To enable: create cache at https://cachix.org, add CACHIX_AUTH_TOKEN secret, and set skipPush: false
      - uses: cachix/cachix-action@v14
        with:
          name: mycache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true
        continue-on-error: true

      # Run commands in reproducible Nix shell environment
      - uses: workflow/nix-shell-action@v2
        with:
          packages: nixFlakes
          script: |
            nix flake check
            nix build
            nix build .#checks.x86_64-linux.nixvim-startup-test
            nix build .#checks.x86_64-linux.nixvim-messages-test
            nix build .#checks.x86_64-linux.nixvim-lsp-test
            nix build .#checks.x86_64-linux.nixvim-keymaps-test
            echo "All tests passed"
