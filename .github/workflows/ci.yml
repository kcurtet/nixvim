name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      # Cachix for Nix build caching (disabled by default)
      # To enable: create cache at https://cachix.org, add CACHIX_AUTH_TOKEN secret, and set skipPush: false
      - uses: cachix/cachix-action@v14
        with:
          name: mycache
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true
        continue-on-error: true

      # Verify Nix flake configuration
      - run: nix flake check

      # Build Nixvim package
      - run: nix build

      # Run all automated tests
      - run: nix build .#checks.x86_64-linux.nixvim-startup-test
      - run: nix build .#checks.x86_64-linux.nixvim-messages-test
      - run: nix build .#checks.x86_64-linux.nixvim-lsp-test
      - run: nix build .#checks.x86_64-linux.nixvim-keymaps-test

      # Verify nix-shell works (basic dev environment test)
      - run: nix-shell --run "echo OK"
